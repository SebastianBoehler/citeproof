name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: uv run --extra dev pytest
      - name: Run sample eval
        run: uv run citeproof eval examples/claim_support.jsonl
      - name: Run hallucination eval
        run: |
          uv run citeproof eval-draft examples/hallucination/draft.md \
            --sources examples/hallucination/sources \
            --bib examples/hallucination/references.bib \
            --expected examples/hallucination/expected.jsonl
      - name: Run sample draft verification
        run: |
          set +e
          uv run citeproof verify examples/draft.md --sources examples/sources
          code=$?
          test "$code" -eq 2
